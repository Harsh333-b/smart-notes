<!DOCTYPE html>
<html>
<head>
    <title>Edit Note</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h2>Edit Note</h2>

<form method="POST">
    <input type="text" name="title" value="{{ note.title }}" required>
    <textarea name="content" required>{{ note.content }}</textarea>

    <select name="tag">
        <option {% if note.tag=="Work" %}selected{% endif %}>Work</option>
        <option {% if note.tag=="Personal" %}selected{% endif %}>Personal</option>
        <option {% if note.tag=="Important" %}selected{% endif %}>Important</option>
    </select>

    <button type="submit">Update</button>
</form>

</body>
</html>
